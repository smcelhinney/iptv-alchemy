<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iptv-alchemy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }

    .carousel-container {
      -webkit-user-select: none;
      user-select: none;
    }
    .carousel-container:active {
      cursor: grabbing;
    }

    .carousel-slide {
      position: absolute;
      top: 0;
      left: 50%;
      width: 85%;
      max-width: 820px;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1),
                  opacity 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
      will-change: transform, opacity;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 1.25rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }

    .carousel-slide .fallback {
      width: 100%;
      height: 100%;
      border-radius: 1.25rem;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 0.875rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }

    .carousel-slide .label {
      position: absolute;
      bottom: -3.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .carousel-arrow {
      position: absolute;
      top: 40%;
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      color: #fff;
    }

    .carousel-wrapper:hover .carousel-arrow {
      opacity: 1;
      pointer-events: auto;
    }
    .carousel-arrow:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      background: #4b5563;
      transition: background 0.3s, transform 0.3s;
      cursor: pointer;
    }
    .carousel-dot.active {
      background: #3b82f6;
      transform: scale(1.3);
    }
    .carousel-dot:hover {
      background: #9ca3af;
    }

    @media (max-width: 640px) {
      .carousel-slide { width: 90%; }
      .carousel-arrow { display: none; }
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-200 font-sans antialiased">

  <!-- Hero -->
  <header class="relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-gray-900 via-slate-800 to-gray-950"></div>
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_#3b82f6_0%,_transparent_60%)] opacity-20"></div>
    <div class="relative max-w-5xl mx-auto px-6 py-24 sm:py-32 text-center">
      <h1 class="text-5xl sm:text-6xl font-bold tracking-tight text-white">
        iptv-alchemy
      </h1>
      <p class="mt-4 text-lg sm:text-xl text-gray-400 max-w-2xl mx-auto">
        A personal IPTV library manager — search, stream, and organise your
        live TV, movies, and series with full-text search, metadata enrichment,
        and subtitle support.
      </p>
      <div class="mt-8 flex items-center justify-center gap-4">
        <span class="inline-flex items-center gap-2 text-sm text-gray-500">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
          <a href="https://github.com/smcelhinney/iptv-alchemy" class="hover:text-gray-300 transition-colors">smcelhinney/iptv-alchemy</a>
        </span>
      </div>
    </div>
  </header>

  <!-- Carousel Section -->
  <section class="max-w-6xl mx-auto px-6 pb-32">
    <h2 class="text-2xl font-semibold text-white text-center mb-2">Screenshots</h2>
    <p class="text-gray-500 text-center mb-12 text-sm">Swipe or use arrow keys to browse.</p>

    <div class="carousel-wrapper relative select-none">
      <!-- track container with fixed aspect ratio -->
      <div class="carousel-container relative mx-auto w-full max-w-4xl aspect-[16/10] overflow-hidden cursor-grab" id="carousel">
        <!-- slides injected by JS -->
      </div>

      <!-- Arrows -->
      <button class="carousel-arrow left-4 lg:left-0 -translate-x-1/2" id="prevBtn" aria-label="Previous">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
      <button class="carousel-arrow right-4 lg:right-0 translate-x-1/2" id="nextBtn" aria-label="Next">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </button>

      <!-- Dots -->
      <div class="flex items-center justify-center gap-2 mt-16" id="dots"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="border-t border-gray-800">
    <div class="max-w-5xl mx-auto px-6 py-8 flex items-center justify-between text-sm text-gray-500">
      <p>&copy; 2026 iptv-alchemy</p>
      <a
        href="https://github.com/smcelhinney/iptv-alchemy"
        class="hover:text-gray-300 transition-colors inline-flex items-center gap-1.5"
      >
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </a>
    </div>
  </footer>

  <script>
    const SLIDES = [
      {
        img: 'screenshots/search.png',
        title: 'Search &amp; Browse',
        desc: 'Full-text search across live TV, movies, and series with instant results and faceted filtering.',
      },
      {
        img: 'screenshots/player.png',
        title: 'Stream Player',
        desc: 'Built-in video player with subtitle support, adjustable offset, and playback memory.',
      },
      {
        img: 'screenshots/settings.png',
        title: 'Settings Drawer',
        desc: 'Per-viewer preferences for subtitle size, offset, and subtitle on/off toggle.',
      },
      {
        img: 'screenshots/library.png',
        title: 'Personal Library',
        desc: 'Save and organise your favourite channels, movies, and series in one place.',
      },
    ]

    const LEN = SLIDES.length
    let current = 0
    let isAnimating = false

    const carousel = document.getElementById('carousel')
    const dotsEl = document.getElementById('dots')
    const prevBtn = document.getElementById('prevBtn')
    const nextBtn = document.getElementById('nextBtn')

    // --- Normalise circular offset ---
    function offsetOf(index) {
      let off = index - current
      if (off > Math.floor(LEN / 2)) off -= LEN
      if (off < -Math.floor(LEN / 2)) off += LEN
      return off
    }

    // --- Build static slides DOM ---
    const slideEls = []
    SLIDES.forEach((s, i) => {
      const div = document.createElement('div')
      div.className = 'carousel-slide'
      div.dataset.index = i

      const img = document.createElement('img')
      img.src = s.img
      img.alt = s.title
      img.draggable = false
      img.onerror = function () {
        this.style.display = 'none'
        const fb = document.createElement('div')
        fb.className = 'fallback'
        fb.textContent = s.img
        div.insertBefore(fb, this.nextSibling)
      }

      const label = document.createElement('div')
      label.className = 'label'
      label.innerHTML = `
        <h3 class="text-lg font-medium text-white">${s.title}</h3>
        <p class="text-sm text-gray-400 mt-1">${s.desc}</p>
      `

      div.appendChild(img)
      div.appendChild(label)
      carousel.appendChild(div)
      slideEls.push(div)

      // Dot
      const dot = document.createElement('button')
      dot.className = 'carousel-dot'
      dot.setAttribute('aria-label', `Go to slide ${i + 1}`)
      dot.addEventListener('click', () => goTo(i))
      dotsEl.appendChild(dot)
    })

    const dots = dotsEl.querySelectorAll('.carousel-dot')

    // --- Apply transforms ---
    function updateSlides() {
      slideEls.forEach((el, i) => {
        const off = offsetOf(i)
        const abs = Math.abs(off)

        el.style.transitionDuration = isAnimating ? '0.5s' : '0s'
        el.style.pointerEvents = off === 0 ? 'auto' : 'none'

        if (abs > 1) {
          const dir = off > 0 ? 1 : -1
          el.style.transform = `translateX(-50%) translateX(${dir * 600}px) scale(0.5)`
          el.style.opacity = '0'
        } else if (off === -1) {
          el.style.transform = 'translateX(-50%) translateX(-280px) scale(0.75)'
          el.style.opacity = '0.45'
        } else if (off === 0) {
          el.style.transform = 'translateX(-50%) scale(1)'
          el.style.opacity = '1'
        } else if (off === 1) {
          el.style.transform = 'translateX(-50%) translateX(280px) scale(0.75)'
          el.style.opacity = '0.45'
        }
      })

      dots.forEach((d, i) => d.classList.toggle('active', i === current))
    }

    // --- Navigation ---
    function goTo(index) {
      if (isAnimating || index === current) return
      const diff = index - current
      // Pick shortest direction
      const shortest = ((diff % LEN) + LEN) % LEN
      const dir = shortest > LEN / 2 ? shortest - LEN : shortest
      navigate(dir)
    }

    function navigate(dir) {
      if (isAnimating) return
      isAnimating = true
      current = ((current + dir) % LEN + LEN) % LEN
      updateSlides()
      setTimeout(() => { isAnimating = false }, 550)
    }

    // --- Touch / Pointer drag ---
    let startX = 0
    let isDragging = false

    carousel.addEventListener('pointerdown', (e) => {
      startX = e.clientX
      isDragging = true
      carousel.setPointerCapture(e.pointerId)
      carousel.style.cursor = 'grabbing'
    })

    carousel.addEventListener('pointermove', (e) => {
      if (!isDragging) return
      // subtle follow
      const diff = e.clientX - startX
      const move = Math.max(-80, Math.min(80, diff * 0.15))
      const center = slideEls[current]
      if (center) {
        center.style.transitionDuration = '0s'
        center.style.transform = `translateX(calc(-50% + ${move}px)) scale(1)`
      }
    })

    carousel.addEventListener('pointerup', (e) => {
      if (!isDragging) return
      isDragging = false
      carousel.style.cursor = 'grab'
      const diff = e.clientX - startX
      // reset center slide transform
      const center = slideEls[current]
      if (center) {
        center.style.transitionDuration = '0.3s'
        center.style.transform = 'translateX(-50%) scale(1)'
      }
      if (Math.abs(diff) > 50) {
        navigate(diff > 0 ? -1 : 1)
      }
    })

    carousel.addEventListener('pointercancel', () => {
      isDragging = false
      carousel.style.cursor = 'grab'
    })

    // --- Keyboard ---
    document.addEventListener('keydown', (e) => {
      const section = carousel.closest('section')
      if (!section) return
      const rect = section.getBoundingClientRect()
      const inView = rect.top < window.innerHeight && rect.bottom > 0
      if (!inView) return
      if (e.key === 'ArrowLeft') { e.preventDefault(); navigate(-1) }
      if (e.key === 'ArrowRight') { e.preventDefault(); navigate(1) }
    })

    // --- Button clicks ---
    prevBtn.addEventListener('click', () => navigate(-1))
    nextBtn.addEventListener('click', () => navigate(1))

    // --- Init ---
    setTimeout(() => { updateSlides() }, 50)
  </script>

</body>
</html>
